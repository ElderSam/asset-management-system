services:
  # PostgreSQL Database
  database:
    image: postgres:18-alpine
    container_name: asset-db
    environment:
      POSTGRES_DB: assetdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asset-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asset-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/assetdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - asset-network
    restart: on-failure

  # React Frontend com Vite dev server
  frontend:
    image: node:20-alpine
    container_name: asset-frontend
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --host"
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      # Monta código fonte para hot reload
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - asset-network

volumes:
  postgres_data:
    driver: local

networks:
  asset-network:
